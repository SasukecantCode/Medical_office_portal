name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'desktop-app/**'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          
      - name: Build Python Backend Sidecar
        working-directory: ./backend
        shell: bash
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env
          mkdir -p ../credentials
          echo "${{ secrets.GCS_KEY_JSON }}" > ../credentials/gcs-key.json
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller --name medical-backend --onefile run_server.py --add-data ".env;." --add-data "../credentials/gcs-key.json;." --add-data "alembic.ini;." --add-data "alembic;alembic"
          mkdir -p ../desktop-app/src-tauri/binaries
          cp dist/medical-backend.exe ../desktop-app/src-tauri/binaries/medical-backend-x86_64-pc-windows-msvc.exe
        
      - name: Install dependencies
        working-directory: ./desktop-app
        run: npm install

      - name: Build Tauri App & Create Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./desktop-app
          tagName: v-5
          releaseName: "DMO Namsai Portal v-5 (Vite-Bundled Full Features)"
          releaseBody: "v5: Vite now bundles all JS/CSS/npm packages. Full webapp feature parity including ID card export, document vault, and admin logs."
          releaseDraft: false
          prerelease: false

      - name: Upload Windows Installer Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Namsai-Portal-Windows-Installers
          path: |
            desktop-app/src-tauri/target/release/bundle/msi/*.msi
            desktop-app/src-tauri/target/release/bundle/nsis/*.exe
