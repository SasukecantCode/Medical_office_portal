<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DMO Namsai Portal</title>
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <div id="app">
      <!-- Login View -->
      <section id="login-view" class="view active">
        <div class="login-box">
          <h2>DMO Namsai Portal</h2>
          <p>Desktop Shell Login</p>
          <form id="login-form">
            <input type="text" id="username" placeholder="Username" required />
            <input type="password" id="password" placeholder="Password" required />
            <button type="submit">Log In</button>
            <div id="login-error" class="error"></div>
          </form>
        </div>
      </section>

      <!-- Main Shell -->
      <section id="main-view" class="view">
        <header>
          <div class="header-title">DMO Namsai - Staff Directory</div>
          <button id="logout-btn">Log Out</button>
        </header>

        <div class="layout">
          <!-- Staff List Sidebar -->
          <aside class="sidebar">
            <h3>Staff Members</h3>
            <ul id="staff-list"></ul>
          </aside>

          <!-- Vault View -->
          <main class="vault-area">
            <div id="no-selection">Select a staff member to view documents</div>
            <div id="vault-content" style="display:none;">
              <h2 id="staff-name-title">Staff Name</h2>
              
              <div class="toolbar">
                <h3>Document Drafts</h3>
                <button id="new-draft-btn">New Blank Draft</button>
              </div>

              <div id="drafts-list" class="grid-list">
                <!-- Drafts will be injected here -->
              </div>
            </div>
          </main>
        </div>
      </section>
    </div>
  </body>
</html>
